<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioLogist Cell Investigation</title>
    <style>
        :root { 
            --primary: #2c3e50; --accent: #e74c3c; --success: #27ae60; 
            --bg: #030712; --nav-bg: #0a0f1e; --text-gray: #9ca3af;
        }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* 1. BioLogist 상단 헤더 */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: var(--nav-bg); border-bottom: 1px solid #1f2937;
        }
        .nav-left { font-size: 1.4rem; font-weight: bold; letter-spacing: -0.5px; }
        .nav-right { text-align: right; display: flex; align-items: center; gap: 20px; }
        .dashboard-info { font-size: 0.7rem; color: var(--text-gray); line-height: 1.2; text-transform: uppercase; font-weight: bold; }
        
        .social-group { display: flex; gap: 8px; }
        .social-btn { 
            padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; 
            text-decoration: none; color: white; display: flex; align-items: center; gap: 5px;
        }
        .btn-blog { background: #15b358; } /* 초록색 블로그 */
        .btn-insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        /* 2. 전체 레이아웃 */
        #main-content { max-width: 1200px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        /* 스토리 및 가이드 */
        .story-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid #1f2937; }
        .story-box h2 { margin-top: 0; color: #3b82f6; font-size: 1.2rem; }

        /* 단서 창 (확장됨) */
        #clue-panel { background: rgba(39, 174, 96, 0.05); border: 1px solid var(--success); border-radius: 12px; padding: 15px; }
        #clue-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; margin-top: 10px; }
        .clue-item { background: var(--success); padding: 10px; border-radius: 6px; font-size: 0.85rem; }

        /* 3. 세포 맵 (반응형 최적화) */
        #viewport { 
            position: relative; width: 100%; border-radius: 15px; overflow: hidden; 
            background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
        }
        /* 데스크탑/태블릿에서는 크게, 모바일에서는 너비에 맞춤 */
        #cell-image-container { position: relative; transition: transform 0.8s ease; transform-origin: center; width: 100%; }
        #cell-main-img { width: 100%; height: auto; display: block; max-height: 80vh; object-fit: contain; }

        .label-hitbox { position: absolute; background: rgba(255,255,255,0); cursor: pointer; border-radius: 6px; z-index: 30; }

        /* 4. 하단 검거 구역 */
        #culprit-area { background: #111827; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); text-align: center; }
        .input-group { display: flex; gap: 10px; max-width: 500px; margin: 15px auto 0; }
        #final-answer { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #374151; background: #000; color: white; }
        #btn-catch { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 퀴즈 모달 */
        #modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: white; color: #111;
            padding: 25px; border-radius: 15px; display: none; z-index: 100;
        }
        #modal.active { display: block; }
        .m-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-left">🧬 Biologue Cell Investigation</div>
    <div class="nav-right">
        <div class="dashboard-info">Education Dashboard<br>By BioLogist</div>
        <div class="social-group">
            <a href="#" class="social-btn btn-blog">📝 Blog</a>
            <a href="#" class="social-btn btn-insta">📸 Insta</a>
        </div>
    </div>
</nav>

<div id="main-content">
    <div class="story-box">
        <h2>🔬 사건 브리핑</h2>
        <p>세포 소기관 중 하나가 <strong>'인슐린 단백질'</strong>을 엉뚱한 곳으로 배송했습니다. 각 소기관의 명칭을 클릭하여 수사를 진행하고, 확보한 단서를 조합해 범인을 검거하세요.</p>
    </div>

    <div id="clue-panel">
        <strong style="color: var(--success);">[수사 기록 현황]</strong>
        <div id="clue-container"></div>
    </div>

    <div id="viewport">
        <div id="cell-image-container">
            <img src="1101.png" id="cell-main-img">
            
            <!-- 클릭 영역 (이미지 비율에 따라 미세조정 가능) -->
            <div class="label-hitbox" style="top: 13%; left: 10%; width: 15%; height: 6%;" onclick="openInvestigate('nucleus', 1.6, 48, 40)"></div>
            <div class="label-hitbox" style="top: 36%; left: 2%; width: 20%; height: 6%;" onclick="openInvestigate('rer', 1.8, 45, 55)"></div>
            <div class="label-hitbox" style="top: 52%; left: 2%; width: 20%; height: 6%;" onclick="openInvestigate('ser', 1.8, 40, 50)"></div>
            <div class="label-hitbox" style="top: 66%; left: 2%; width: 20%; height: 6%;" onclick="openInvestigate('mito', 2.0, 35, 68)"></div>
            
            <div class="label-hitbox" style="top: 28%; left: 80%; width: 18%; height: 6%;" onclick="openInvestigate('lyso', 2.2, 68, 30)"></div>
            <div class="label-hitbox" style="top: 39%; left: 80%; width: 18%; height: 6%;" onclick="openInvestigate('ribo', 2.2, 65, 45)"></div>
            <div class="label-hitbox" style="top: 53%; left: 80%; width: 18%; height: 6%;" onclick="openInvestigate('golgi', 1.8, 65, 65)"></div>
            <div class="label-hitbox" style="top: 62%; left: 80%; width: 18%; height: 6%;" onclick="openInvestigate('membrane', 1.6, 85, 80)"></div>
            <div class="label-hitbox" style="top: 71%; left: 80%; width: 18%; height: 6%;" onclick="openInvestigate('cytoplasm', 1.2, 60, 80)"></div>
        </div>
    </div>

    <div id="culprit-area">
        <h3 style="margin:0; color: var(--accent);">🚨 진범 지목 (기회: <span id="tries">3</span>회)</h3>
        <div class="input-group">
            <input type="text" id="final-answer" placeholder="범인인 소기관의 이름을 입력하세요...">
            <button id="btn-catch" onclick="guessCulprit()">검거 시작</button>
        </div>
    </div>
</div>

<div id="modal">
    <h3 id="m-title"></h3>
    <p id="m-question"></p>
    <div id="m-input-wrap">
        <input type="text" id="m-input" style="width:100%; padding:10px; box-sizing:border-box; margin-bottom:10px;">
        <button class="m-btn" style="background:var(--primary); color:white;" onclick="confirmAnswer()">단서 확보</button>
    </div>
    <button class="m-btn" style="background:#eee; color:#333;" onclick="closeInvestigate()">수사 중단</button>
</div>

<script>
    const orgData = {
        nucleus: { name: "핵", q: "DNA를 mRNA로 복사하는 이 과정의 이름은?", a: "전사", clue: "인슐린 설계도는 정상적으로 발행되었습니다." },
        rer: { name: "거친면 소포체", q: "단백질 통로 역할을 하는 이 곳의 명칭은?", a: "소포체", clue: "단백질이 통로를 통해 무사히 골지체 방향으로 이동했습니다." },
        ser: { name: "매끈면 소포체", q: "지질을 합성하고 독성을 해독하는 이 곳은?", a: "매끈면 소포체", clue: "지질 공정은 이번 사건과 큰 연관이 없습니다." },
        mito: { name: "마이토콘드리아", q: "에너지(ATP)를 생산하는 이 소기관의 이름은?", a: "마이토콘드리아", clue: "세포 내 에너지 공급은 원활합니다." },
        lyso: { name: "리소좀", q: "세포 내 소화를 담당하는 이 주머니의 이름은?", a: "리소좀", clue: "발견: 리소좀 내부에서 소화되다 남은 인슐린 조각 발견!" },
        ribo: { name: "라이보솜", q: "단백질을 합성하는 알갱이 모양의 소기관은?", a: "라이보솜", clue: "공장에서 단백질은 아주 정상적으로 찍혀 나왔습니다." },
        golgi: { name: "골지체", q: "단백질을 분류하고 최종 배송지를 지정하는 곳은?", a: "골지체", clue: "결정적 증거: 배송 라벨이 '분비'가 아닌 '분해'로 잘못 출력됨!" },
        membrane: { name: "세포막", q: "물질 출입을 조절하는 세포의 경계는?", a: "세포막", clue: "세포막 쪽으론 인슐린 소낭이 전혀 도착하지 않았습니다." },
        cytoplasm: { name: "세포질", q: "소기관이 떠 있는 이 젤리 상태의 공간은?", a: null, clue: null }
    };

    let tries = 3;
    let currentKey = null;
    let cluesFound = new Set();

    function openInvestigate(key, zoom, x, y) {
        currentKey = key;
        const container = document.getElementById('cell-image-container');
        // 확대 로직
        container.style.transform = `scale(${zoom}) translate(${50 - x}%, ${50 - y}%)`;
        
        setTimeout(() => {
            document.getElementById('m-title').innerText = orgData[key].name;
            document.getElementById('m-question').innerText = orgData[key].q || "조용하고 평화로운 공간입니다. 특별한 단서가 보이지 않습니다.";
            document.getElementById('m-input-wrap').style.display = orgData[key].a ? 'block' : 'none';
            document.getElementById('modal').classList.add('active');
        }, 800);
    }

    function confirmAnswer() {
        const val = document.getElementById('m-input').value.trim();
        if (val === orgData[currentKey].a) {
            if (!cluesFound.has(currentKey)) {
                cluesFound.add(currentKey);
                const item = document.createElement('div');
                item.className = 'clue-item';
                item.innerText = `✅ ${orgData[currentKey].clue}`;
                document.getElementById('clue-container').prepend(item);
            }
            alert("증거를 수집했습니다!");
            closeInvestigate();
        } else { alert("오답입니다."); }
    }

    function closeInvestigate() {
        document.getElementById('cell-image-container').style.transform = "scale(1) translate(0,0)";
        document.getElementById('modal').classList.remove('active');
        document.getElementById('m-input').value = "";
    }

    function guessCulprit() {
        const ans = document.getElementById('final-answer').value.trim();
        if (ans === "골지체") {
            alert("🎊 정답입니다! 수사관님, 사건을 해결하셨군요! 범인은 분류 실수를 저지른 골지체였습니다.");
            location.reload();
        } else {
            tries--;
            document.getElementById('tries').innerText = tries;
            if (tries <= 0) { alert("기회를 모두 잃었습니다. 범인은 골지체였습니다."); location.reload(); }
            else { alert("틀렸습니다! 범인은 다른 곳에 있습니다."); }
        }
    }
</script>
</body>
</html>
