<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세포 수사대: 인슐린 실종 사건</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --success: #27ae60; --bg: #1a1a1a; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        
        #game-wrapper { max-width: 1000px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; min-height: 100vh; }

        /* 1. 스토리 및 게임 설명 */
        header { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        header h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: #3498db; }
        header p { margin: 5px 0; font-size: 0.95rem; line-height: 1.6; color: #ccc; }
        .guide { font-size: 0.85rem; color: #999; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #444; }

        /* 2. 단서 리스트 (상단 배치 & 확대) */
        #clue-panel { background: rgba(39, 174, 96, 0.1); border: 1px solid var(--success); border-radius: 15px; padding: 15px; min-height: 80px; }
        #clue-panel h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--success); }
        #clue-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .clue-item { background: var(--success); color: white; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; animation: fadeIn 0.4s; }

        /* 3. 메인 뷰포트 (그림 여유 있게) */
        #viewport { 
            position: relative; width: 100%; height: 50vh; min-height: 300px; max-height: 600px;
            background: #000; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #cell-image-container { position: relative; transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1); transform-origin: center; }
        #cell-main-img { width: auto; height: 45vh; max-height: 550px; display: block; }

        /* 클릭 레이블 */
        .label-hitbox { position: absolute; background: rgba(255,255,255,0); cursor: pointer; border-radius: 8px; z-index: 30; }
        .label-hitbox:hover { background: rgba(52, 152, 219, 0.2); border: 1px solid #3498db; }

        /* 4. 범인 입력창 (하단 배치) */
        #footer-ui { background: rgba(231, 76, 60, 0.1); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; text-align: center; }
        #footer-ui h3 { margin: 0 0 15px 0; color: var(--accent); }
        .input-group { display: flex; justify-content: center; gap: 10px; max-width: 400px; margin: 0 auto; }
        #final-answer { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 1rem; }
        #submit-btn { padding: 12px 25px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 모달 */
        #modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 400px; background: white; color: #333;
            padding: 25px; border-radius: 20px; display: none; z-index: 100;
        }
        #modal.active { display: block; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="game-wrapper">
    <!-- 스토리 및 가이드 -->
    <header>
        <h1>🔬 사라진 인슐린: 세포 내 배달 사고</h1>
        <p><strong>사건 발생:</strong> 췌장 세포에서 생성된 '인슐린' 단백질이 혈관으로 나가지 못하고 세포 내부에서 실종되었습니다! 인슐린은 원래 세포 밖으로 분비되어야 하지만, 어딘가에서 배송 사고가 발생한 것으로 보입니다.</p>
        <div class="guide">
            <strong>[수사 방법]</strong> 그림 주변의 <strong>소기관 이름</strong>을 클릭하여 확대 수사하세요. 퀴즈를 풀면 단서를 얻을 수 있습니다. 모든 단서를 모아 범인(사고가 발생한 소기관)을 지목하세요!
        </div>
    </header>

    <!-- 단서 수집함 -->
    <div id="clue-panel">
        <h3>🔍 수집된 수사 기록</h3>
        <div id="clue-container">
            <!-- 단서가 여기 추가됩니다 -->
        </div>
    </div>

    <!-- 세포 지도 -->
    <div id="viewport">
        <div id="cell-image-container">
            <img src="1101.png" id="cell-main-img">
            
            <!-- 왼쪽 명칭 레이블 -->
            <div class="label-hitbox" style="top: 13%; left: 10%; width: 15%; height: 8%;" onclick="investigate('nucleus', 1.8, 48, 40)"></div>
            <div class="label-hitbox" style="top: 36%; left: 2%; width: 20%; height: 8%;" onclick="investigate('rer', 2.0, 45, 55)"></div>
            <div class="label-hitbox" style="top: 52%; left: 2%; width: 20%; height: 8%;" onclick="investigate('ser', 2.0, 40, 50)"></div>
            <div class="label-hitbox" style="top: 66%; left: 2%; width: 20%; height: 8%;" onclick="investigate('mito', 2.2, 35, 68)"></div>
            
            <!-- 오른쪽 명칭 레이블 -->
            <div class="label-hitbox" style="top: 28%; left: 80%; width: 18%; height: 8%;" onclick="investigate('lyso', 2.5, 68, 30)"></div>
            <div class="label-hitbox" style="top: 39%; left: 80%; width: 18%; height: 8%;" onclick="investigate('ribo', 2.5, 65, 45)"></div>
            <div class="label-hitbox" style="top: 53%; left: 80%; width: 18%; height: 8%;" onclick="investigate('golgi', 2.0, 65, 65)"></div>
            <div class="label-hitbox" style="top: 62%; left: 80%; width: 18%; height: 8%;" onclick="investigate('membrane', 1.8, 85, 80)"></div>
            <div class="label-hitbox" style="top: 71%; left: 80%; width: 18%; height: 8%;" onclick="investigate('cytoplasm', 1.5, 60, 80)"></div>
        </div>
    </div>

    <!-- 범인 검거 -->
    <div id="footer-ui">
        <h3>🚨 진범 검거 (남은 기회: <span id="try-count">3</span>회)</h3>
        <div class="input-group">
            <input type="text" id="final-answer" placeholder="의심되는 소기관 이름...">
            <button id="submit-btn" onclick="submitFinalAnswer()">지목</button>
        </div>
    </div>
</div>

<!-- 수사 모달 -->
<div id="modal">
    <h3 id="m-title" style="margin-top:0"></h3>
    <p id="m-question"></p>
    <div id="quiz-input-area">
        <input type="text" id="m-input" style="width:100%; padding:10px; box-sizing:border-box;" placeholder="정답 입력">
        <button class="btn" style="background: var(--primary); color:white;" onclick="checkQuiz()">단서 확보</button>
    </div>
    <button class="btn" style="background: #eee; color:#333;" onclick="closeModal()">수사 중단</button>
</div>

<script>
    // [데이터 생략 방지를 위해 이전 로직 유지]
    const orgData = {
        nucleus: { name: "핵", q: "유전 정보를 저장하고 세포의 생명 활동을 조절하는 곳은?", a: "핵", clue: "인슐린 설계도(mRNA)는 정상적으로 발송되었습니다." },
        rer: { name: "거친면 소포체", q: "리보솜이 붙어 있어 단백질을 가공하고 운반하는 통로는?", a: "소포체", clue: "생산된 단백질이 통로를 통해 무사히 나갔습니다." },
        ser: { name: "매끈면 소포체", q: "지질 합성 및 독성 물질 해독을 담당하는 이곳은?", a: "매끈면 소포체", clue: "지질 합성 공정은 이번 사건과 무관합니다." },
        mito: { name: "마이토콘드리아", q: "세포 호흡을 통해 에너지를 만드는 공장은?", a: "마이토콘드리아", clue: "세포 내 에너지는 충분합니다. 정전은 아닙니다." },
        lyso: { name: "리소좀", q: "세포 내 소화를 담당하는 폐기물 처리장은?", a: "리소좀", clue: "충격: 리소좀 내부에서 파괴된 인슐린이 발견되었습니다!" },
        ribo: { name: "라이보솜", q: "단백질을 합성하는 알갱이 모양의 소기관은?", a: "라이보솜", clue: "인슐린은 공장에서 아주 활발히 생산되었습니다." },
        golgi: { name: "골지체", q: "단백질을 분류하고 최종 배송지를 결정하는 곳은?", a: "골지체", clue: "결정적 증거: 배송지가 '세포 밖'이 아닌 '리소좀'으로 잘못 지정됨!" },
        membrane: { name: "세포막", q: "세포의 경계를 이루며 물질 출입을 조절하는 곳은?", a: "세포막", clue: "세포 외부로 나가는 택배 상자가 하나도 도착하지 않았습니다." },
        cytoplasm: { name: "세포질", q: "설명: 소기관들이 떠 있는 공간입니다. 너무 넓어 별다른 단서가 보이지 않습니다.", a: null, clue: null }
    };

    let tries = 3;
    let currentId = null;
    let collectedClues = new Set();

    function investigate(id, zoom, tx, ty) {
        currentId = id;
        const container = document.getElementById('cell-image-container');
        container.style.transform = `scale(${zoom}) translate(${50 - tx}%, ${50 - ty}%)`;
        
        setTimeout(() => {
            document.getElementById('m-title').innerText = orgData[id].name;
            document.getElementById('m-question').innerText = orgData[id].q;
            document.getElementById('quiz-input-area').style.display = orgData[id].a ? 'block' : 'none';
            document.getElementById('modal').classList.add('active');
        }, 800);
    }

    function checkQuiz() {
        if (document.getElementById('m-input').value.trim() === orgData[currentId].a) {
            if (!collectedClues.has(currentId)) {
                collectedClues.add(currentId);
                const badge = document.createElement('div');
                badge.className = 'clue-item';
                badge.innerText = `📍 ${orgData[currentId].clue}`;
                document.getElementById('clue-container').prepend(badge);
            }
            alert("중요 단서 확보!");
            closeModal();
        } else { alert("오답입니다."); }
    }

    function closeModal() {
        document.getElementById('cell-image-container').style.transform = `scale(1) translate(0, 0)`;
        document.getElementById('modal').classList.remove('active');
        document.getElementById('m-input').value = "";
    }

    function submitFinalAnswer() {
        const ans = document.getElementById('final-answer').value.trim();
        if (ans === "골지체") {
            alert("🎉 정답! 범인은 배송 라벨을 잘못 붙인 '골지체'였습니다! 수고하셨습니다, 수사관님!");
            location.reload();
        } else {
            tries--;
            document.getElementById('try-count').innerText = tries;
            if (tries <= 0) { alert("수사 실패! 범인은 골지체였습니다."); location.reload(); }
            else { alert("오발령입니다! 다시 추리해보세요."); }
        }
    }
</script>
</body>
</html>
