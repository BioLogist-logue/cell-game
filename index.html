<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세포 수사대: 사라진 인슐린</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #000; overflow: hidden; color: white; }
        
        /* 전체 컨테이너 */
        #game-screen {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
        }

        header { padding: 15px; text-align: center; background: rgba(0,0,0,0.7); z-index: 10; }

        /* 이미지 및 클릭 영역 컨테이너 */
        #viewport {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        #cell-image-container {
            position: relative; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        #cell-main-img {
            max-width: 95vw; max-height: 80vh; display: block;
            border-radius: 15px; box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* 투명 클릭 영역 (히트박스) */
        .hitbox {
            position: absolute; border: 2px solid rgba(255,255,255,0); /* 개발 시 0.3으로 설정해 위치 확인 가능 */
            border-radius: 50%; cursor: pointer; transition: 0.3s;
        }
        .hitbox:hover { background: rgba(255,255,255,0.2); border-color: white; }

        /* 퀴즈 모달 */
        #quiz-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            width: 80%; max-width: 400px; background: white; color: #333;
            padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none; z-index: 100; opacity: 0; transition: 0.3s;
        }
        #quiz-modal.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; }
        
        .close-btn { margin-top: 10px; background: #95a5a6; }
    </style>
</head>
<body>

<div id="game-screen">
    <header>
        <strong>세포 수사대: 인슐린 실종 사건</strong>
        <p style="font-size: 12px; margin-top: 5px;">의심되는 소기관을 클릭하여 수사하세요</p>
    </header>

    <div id="viewport">
        <div id="cell-image-container">
            <img src="1101.png" id="cell-main-img" alt="Animal Cell">
            
            <div class="hitbox" style="top: 35%; left: 42%; width: 20%; height: 25%;" onclick="startInvestigate('nucleus', 1.8, 42, 35)"></div> <div class="hitbox" style="top: 55%; left: 35%; width: 15%; height: 15%;" onclick="startInvestigate('rer', 2.2, 35, 55)"></div> <div class="hitbox" style="top: 65%; left: 58%; width: 15%; height: 15%;" onclick="startInvestigate('golgi', 2.2, 58, 65)"></div> <div class="hitbox" style="top: 15%; left: 45%; width: 10%; height: 10%;" onclick="startInvestigate('mito', 2.5, 45, 15)"></div> </div>
    </div>
</div>

<div id="quiz-modal">
    <h2 id="m-title" style="margin-top:0">소기관 수사</h2>
    <p id="m-question">문제가 출력됩니다.</p>
    <input type="text" id="m-input" placeholder="키워드 입력...">
    <button onclick="checkAnswer()">단서 확보</button>
    <button class="close-btn" onclick="resetZoom()">수사 중단</button>
</div>

<script>
    const data = {
        nucleus: { name: "핵 (Nucleus)", q: "DNA를 mRNA로 복사하는 과정은?", a: "전사", clue: "설계도는 완벽하게 생성되었습니다." },
        rer: { name: "거친면 소포체", q: "단백질이 이동하는 통로 역할을 하는 곳은?", a: "소포체", clue: "단백질 통로에 정체 불명의 물질이 묻어있습니다." },
        golgi: { name: "골지체", q: "단백질을 포장하고 배송하는 곳은?", a: "골지체", clue: "배송 라벨이 리소좀으로 잘못 출력되었습니다!" },
        mito: { name: "마이토콘드리아", q: "세포의 에너지를 만드는 과정은?", a: "세포 호흡", clue: "에너지 공급은 매우 안정적입니다." }
    };

    let currentOrg = null;

    function startInvestigate(id, zoom, x, y) {
        currentOrg = id;
        const container = document.getElementById('cell-image-container');
        
        // 클릭한 부위로 확대 (좌표 반전 계산)
        container.style.transform = `scale(${zoom}) translate(${50 - x}%, ${50 - y}%)`;
        
        // 0.8초 후 퀴즈창 띄우기
        setTimeout(() => {
            document.getElementById('m-title').innerText = data[id].name;
            document.getElementById('m-question').innerText = data[id].q;
            document.getElementById('quiz-modal').classList.add('active');
        }, 800);
    }

    function checkAnswer() {
        const input = document.getElementById('m-input').value.trim();
        if (input === data[currentOrg].a) {
            alert("✔ 중요 단서 획득: " + data[currentOrg].clue);
            resetZoom();
        } else {
            alert("정보가 정확하지 않습니다. 다시 추리해보세요.");
        }
    }

    function resetZoom() {
        document.getElementById('cell-image-container').style.transform = `scale(1) translate(0, 0)`;
        document.getElementById('quiz-modal').classList.remove('active');
        document.getElementById('m-input').value = "";
    }
</script>
</body>
</html>
