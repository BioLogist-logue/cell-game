<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세포 수사대 v2.0</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --success: #27ae60; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #0a0a0a; overflow: hidden; color: white; }
        
        #game-screen { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        /* 1. 단서 목록 (왼쪽 상단) */
        #clue-list {
            position: absolute; top: 20px; left: 20px; width: 220px;
            z-index: 50; display: flex; flex-direction: column; gap: 10px;
        }
        .clue-item {
            background: rgba(39, 174, 96, 0.8); padding: 10px; border-radius: 8px;
            font-size: 13px; border-left: 4px solid white; animation: slideIn 0.5s ease-out;
        }

        /* 2. 범인 지목 칸 (오른쪽 상단) */
        #culprit-box {
            position: absolute; top: 20px; right: 20px; width: 240px;
            background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 12px;
            border: 1px solid #444; z-index: 50; text-align: center;
        }
        #culprit-box input {
            width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 4px;
            border: none; outline: none; box-sizing: border-box;
        }
        #try-count { font-size: 12px; color: #ff7675; margin-top: 5px; }

        /* 메인 뷰포트 */
        #viewport { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #cell-image-container { position: relative; transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1); transform-origin: center; }
        #cell-main-img { max-width: 90vw; max-height: 85vh; display: block; border-radius: 10px; }

        /* 텍스트 레이블 클릭 영역 (지시선 앞 이름 부분) */
        .label-hitbox {
            position: absolute; background: rgba(255,255,255,0); /* 개발 시 0.2로 변경하여 위치 확인 */
            cursor: pointer; border-radius: 4px; z-index: 30;
        }
        .label-hitbox:hover { background: rgba(52, 152, 219, 0.3); border: 1px solid #3498db; }

        /* 퀴즈 모달 */
        #quiz-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; background: white; color: #333;
            padding: 25px; border-radius: 20px; display: none; z-index: 100;
        }
        #quiz-modal.active { display: block; }
        .modal-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="game-screen">
    <!-- 단서 목록 창 -->
    <div id="clue-list">
        <div style="font-weight: bold; color: #2ecc71; margin-bottom: 5px;">[수집된 증거]</div>
    </div>

    <!-- 범인 지목 창 -->
    <div id="culprit-box">
        <div style="font-size: 14px; margin-bottom: 10px;">🚨 최종 범인(소기관)은?</div>
        <input type="text" id="final-answer" placeholder="정답 입력...">
        <button onclick="submitFinalAnswer()" style="width: 100%; background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer;">제출</button>
        <div id="try-count">남은 기회: 3회</div>
    </div>

    <div id="viewport">
        <div id="cell-image-container">
            <img src="1101.png" id="cell-main-img">
            
            <!-- 이름 클릭 영역 (이미지 내부 글자 위치에 맞게 세팅) -->
            <!-- 왼쪽 라인 명칭들 -->
            <div class="label-hitbox" style="top: 15%; left: 13%; width: 10%; height: 5%;" onclick="investigate('nucleus', 2.0, 48, 40)"></div>
            <div class="label-hitbox" style="top: 38%; left: 2%; width: 18%; height: 5%;" onclick="investigate('rer', 2.5, 45, 55)"></div>
            <div class="label-hitbox" style="top: 54%; left: 2%; width: 18%; height: 5%;" onclick="investigate('ser', 2.5, 40, 50)"></div>
            <div class="label-hitbox" style="top: 68%; left: 2%; width: 18%; height: 5%;" onclick="investigate('mito', 2.8, 35, 68)"></div>
            
            <!-- 오른쪽 라인 명칭들 -->
            <div class="label-hitbox" style="top: 30%; left: 83%; width: 13%; height: 5%;" onclick="investigate('lyso', 3.0, 68, 30)"></div>
            <div class="label-hitbox" style="top: 41%; left: 83%; width: 13%; height: 5%;" onclick="investigate('ribo', 3.0, 65, 45)"></div>
            <div class="label-hitbox" style="top: 55%; left: 83%; width: 13%; height: 5%;" onclick="investigate('golgi', 2.5, 65, 65)"></div>
            <div class="label-hitbox" style="top: 64%; left: 83%; width: 13%; height: 5%;" onclick="investigate('membrane', 2.2, 85, 80)"></div>
        </div>
    </div>
</div>

<div id="quiz-modal">
    <h3 id="m-title"></h3>
    <p id="m-question"></p>
    <input type="text" id="m-input" placeholder="정답 입력...">
    <button class="modal-btn" style="background: var(--primary); color: white;" onclick="checkQuiz()">확인</button>
    <button class="modal-btn" style="background: #eee; color: #333;" onclick="resetView()">닫기</button>
</div>

<script>
    const orgData = {
        nucleus: { name: "핵", q: "유전 정보를 저장하고 세포의 생명 활동을 조절하는 이곳은?", a: "핵", clue: "인슐린 설계도(mRNA)는 정상적으로 발송되었습니다." },
        rer: { name: "거친면 소포체", q: "리보솜이 붙어 있어 단백질을 가공하고 운반하는 이곳은?", a: "소포체", clue: "단백질이 이동 통로를 통해 정상적으로 나갔습니다." },
        ser: { name: "매끈면 소포체", q: "지질 합성 및 독성 물질 해독을 담당하는 이곳은?", a: "매끈면 소포체", clue: "지질 합성 라인은 이번 사건과 관련이 없어 보입니다." },
        mito: { name: "마이토콘드리아", q: "세포 호흡을 통해 에너지를 생산하는 이곳은?", a: "마이토콘드리아", clue: "에너지는 충분합니다. 정전은 아니군요." },
        lyso: { name: "리소좀", q: "가수 분해 효소가 있어 세포 내 소화를 담당하는 이곳은?", a: "리소좀", clue: "특이사항: 리소좀 내부에서 파괴된 인슐린 조각들이 발견되었습니다!" },
        ribo: { name: "라이보솜", q: "단백질을 합성하는 작은 알갱이 모양의 소기관은?", a: "라이보솜", clue: "인슐린 생산은 아주 활발했습니다." },
        golgi: { name: "골지체", q: "단백질을 최종 가공하여 배송 주소를 결정하는 이곳은?", a: "골지체", clue: "결정적 증거: 배송 주소가 '세포 밖'이 아닌 '리소좀'으로 잘못 찍혀 있습니다!" },
        membrane: { name: "세포막", q: "세포의 내부를 보호하고 물질 출입을 조절하는 경계는?", a: "세포막", clue: "세포막 너머 혈관에는 인슐린이 도착하지 않았습니다." }
    };

    let tries = 3;
    let currentId = null;
    let collectedClues = new Set();

    function investigate(id, zoom, tx, ty) {
        currentId = id;
        const container = document.getElementById('cell-image-container');
        // 확대 로직: 중앙(50,50)에서 타겟(tx,ty)만큼 이동
        container.style.transform = `scale(${zoom}) translate(${50 - tx}%, ${50 - ty}%)`;
        
        setTimeout(() => {
            document.getElementById('m-title').innerText = orgData[id].name;
            document.getElementById('m-question').innerText = orgData[id].q;
            document.getElementById('quiz-modal').classList.add('active');
        }, 1000);
    }

    function checkQuiz() {
        const input = document.getElementById('m-input').value.trim();
        if (input === orgData[currentId].a) {
            if (!collectedClues.has(currentId)) {
                collectedClues.add(currentId);
                const list = document.getElementById('clue-list');
                const item = document.createElement('div');
                item.className = 'clue-item';
                item.innerText = `🔍 ${orgData[currentId].clue}`;
                list.appendChild(item);
            }
            alert("단서를 확보했습니다!");
            resetView();
        } else {
            alert("오답입니다. 다시 생각해보세요!");
        }
    }

    function resetView() {
        document.getElementById('cell-image-container').style.transform = `scale(1) translate(0, 0)`;
        document.getElementById('quiz-modal').classList.remove('active');
        document.getElementById('m-input').value = "";
    }

    function submitFinalAnswer() {
        const ans = document.getElementById('final-answer').value.trim();
        if (ans === "골지체") {
            alert("🎉 정답입니다! 범인은 분류 오류를 일으킨 '골지체'였습니다. 인슐린을 리소좀으로 잘못 배송했군요!");
            location.reload();
        } else {
            tries--;
            if (tries > 0) {
                alert(`틀렸습니다! 범인은 아직 세포 어딘가에 있습니다. (남은 기회: ${tries}회)`);
                document.getElementById('try-count').innerText = `남은 기회: ${tries}회`;
            } else {
                alert("기회를 모두 소진했습니다. 인슐린 배달 사고는 미궁 속으로... (정답: 골지체)");
                location.reload();
            }
        }
    }
</script>
</body>
</html>
