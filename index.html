<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>세포 수사대: 모바일 최적화</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --success: #27ae60; --glass: rgba(0, 0, 0, 0.7); }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: #000; color: white; overflow: hidden; height: 100vh; }
        
        /* 전체 레이아웃 */
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }

        /* 상단 UI 배분 (단서 & 범인 지목) */
        .top-ui-wrapper { 
            position: absolute; top: 10px; left: 0; width: 100%; 
            display: flex; justify-content: space-between; padding: 0 10px; 
            box-sizing: border-box; z-index: 50; pointer-events: none;
        }
        
        .ui-panel { 
            background: var(--glass); border-radius: 12px; padding: 10px; 
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
            pointer-events: auto; max-width: 45%;
        }

        #clue-list { font-size: 11px; max-height: 150px; overflow-y: auto; }
        .clue-badge { background: var(--success); margin-bottom: 4px; padding: 5px; border-radius: 4px; animation: fadeIn 0.3s; }

        #culprit-box { text-align: center; }
        #culprit-box input { width: 80%; padding: 6px; font-size: 14px; border-radius: 4px; border: none; margin-bottom: 5px; }
        #try-count { font-size: 10px; color: #ff7675; }

        /* 메인 뷰포트 (세포 이미지) */
        #viewport { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #cell-image-container { position: relative; transition: transform 0.8s ease-in-out; transform-origin: center; }
        #cell-main-img { width: 95vw; height: auto; display: block; border-radius: 10px; }

        /* 라벨 클릭 영역 (모바일 대응을 위해 클릭 범위를 넉넉하게 설정) */
        .label-hitbox { position: absolute; background: rgba(255,255,255,0); cursor: pointer; border-radius: 10px; z-index: 30; }

        /* 퀴즈/설명 모달 */
        #modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 85%; max-width: 400px; background: white; color: #333;
            padding: 20px; border-radius: 20px; display: none; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        #modal.active { display: block; transform: translate(-50%, -50%) scale(1); transition: 0.3s; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 태블릿/데스크탑 이상일 때 UI 크기 조정 */
        @media (min-width: 768px) {
            .ui-panel { padding: 15px; font-size: 14px; }
            #clue-list { font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-ui-wrapper">
        <!-- 왼쪽 상단: 단서 리스트 -->
        <div id="clue-list" class="ui-panel">
            <div style="font-weight: bold; color: #2ecc71; margin-bottom: 5px; font-size: 12px;">🔍 수집된 단서</div>
            <div id="clue-container"></div>
        </div>

        <!-- 오른쪽 상단: 범인 지목 -->
        <div id="culprit-box" class="ui-panel">
            <div style="font-size: 12px; margin-bottom: 5px;">🚨 범인은?</div>
            <input type="text" id="final-answer" placeholder="소기관 이름">
            <button class="btn" style="background: var(--accent); color: white; padding: 6px; margin:0;" onclick="submitFinalAnswer()">검거</button>
            <div id="try-count">기회: 3회</div>
        </div>
    </div>

    <div id="viewport">
        <div id="cell-image-container">
            <img src="1101.png" id="cell-main-img">
            
            <!-- 왼쪽 라인 명칭 클릭 영역 -->
            <div class="label-hitbox" style="top: 13%; left: 10%; width: 15%; height: 8%;" onclick="investigate('nucleus', 2.0, 48, 40)"></div>
            <div class="label-hitbox" style="top: 36%; left: 2%; width: 20%; height: 8%;" onclick="investigate('rer', 2.2, 45, 55)"></div>
            <div class="label-hitbox" style="top: 52%; left: 2%; width: 20%; height: 8%;" onclick="investigate('ser', 2.2, 40, 50)"></div>
            <div class="label-hitbox" style="top: 66%; left: 2%; width: 20%; height: 8%;" onclick="investigate('mito', 2.5, 35, 68)"></div>
            
            <!-- 오른쪽 라인 명칭 클릭 영역 -->
            <div class="label-hitbox" style="top: 28%; left: 80%; width: 18%; height: 8%;" onclick="investigate('lyso', 2.5, 68, 30)"></div>
            <div class="label-hitbox" style="top: 39%; left: 80%; width: 18%; height: 8%;" onclick="investigate('ribo', 2.5, 65, 45)"></div>
            <div class="label-hitbox" style="top: 53%; left: 80%; width: 18%; height: 8%;" onclick="investigate('golgi', 2.2, 65, 65)"></div>
            <div class="label-hitbox" style="top: 62%; left: 80%; width: 18%; height: 8%;" onclick="investigate('membrane', 2.0, 85, 80)"></div>
            <div class="label-hitbox" style="top: 71%; left: 80%; width: 18%; height: 8%;" onclick="investigate('cytoplasm', 1.5, 60, 80)"></div>
        </div>
    </div>
</div>

<!-- 수사 모달 -->
<div id="modal">
    <h3 id="m-title" style="margin-top:0"></h3>
    <p id="m-question" style="line-height:1.5; font-size: 15px;"></p>
    <div id="quiz-input-area">
        <input type="text" id="m-input" style="width:100%; padding:10px; box-sizing:border-box; border:1px solid #ddd; border-radius:8px;" placeholder="정답 입력">
        <button class="btn" style="background: var(--primary); color:white;" onclick="checkQuiz()">단서 확인</button>
    </div>
    <button class="btn" style="background: #eee; color:#333;" onclick="closeModal()">돌아가기</button>
</div>

<script>
    const orgData = {
        nucleus: { name: "핵", q: "유전 정보를 저장하고 세포의 생명 활동을 조절하는 컨트롤 타워는?", a: "핵", clue: "설계도는 정상 발송되었습니다." },
        rer: { name: "거친면 소포체", q: "리보솜이 붙어 있어 단백질을 가공하고 운반하는 통로는?", a: "소포체", clue: "단백질이 통로를 통해 정상적으로 나갔습니다." },
        ser: { name: "매끈면 소포체", q: "지질 합성 및 독성 물질 해독을 담당하는 이곳은?", a: "매끈면 소포체", clue: "지질 합성 라인은 이상 없습니다." },
        mito: { name: "마이토콘드리아", q: "세포 호흡을 통해 에너지를 만드는 공장은?", a: "마이토콘드리아", clue: "에너지는 충분합니다. 정전은 아니군요." },
        lyso: { name: "리소좀", q: "세포 내 소화를 담당하는 폐기물 처리장은?", a: "리소좀", clue: "특이사항: 리소좀 안에서 파괴된 인슐린 발견!" },
        ribo: { name: "라이보솜", q: "단백질을 합성하는 알갱이 모양의 소기관은?", a: "라이보솜", clue: "인슐린 생산량은 아주 활발했습니다." },
        golgi: { name: "골지체", q: "단백질을 분류하고 최종 배송지를 결정하는 곳은?", a: "골지체", clue: "결정적 증거: 배송지가 '리소좀'으로 잘못 지정됨!" },
        membrane: { name: "세포막", q: "세포의 경계를 이루며 출입을 조절하는 곳은?", a: "세포막", clue: "세포 밖으로 나가는 문은 열리지 않았습니다." },
        cytoplasm: { name: "세포질", q: "설명: 소기관들이 떠 있는 젤리 같은 공간입니다. 너무 넓어 단서를 찾기가 힘드네요!", a: null, clue: null }
    };

    let tries = 3;
    let currentId = null;
    let collectedClues = new Set();

    function investigate(id, zoom, tx, ty) {
        currentId = id;
        const container = document.getElementById('cell-image-container');
        
        // 모바일/태블릿을 위한 줌 계산 (중앙 정렬)
        container.style.transform = `scale(${zoom}) translate(${50 - tx}%, ${50 - ty}%)`;
        
        setTimeout(() => {
            document.getElementById('m-title').innerText = orgData[id].name;
            document.getElementById('m-question').innerText = orgData[id].q;
            
            // 세포질처럼 퀴즈가 없는 경우 처리
            if (orgData[id].a === null) {
                document.getElementById('quiz-input-area').style.display = 'none';
            } else {
                document.getElementById('quiz-input-area').style.display = 'block';
            }
            
            document.getElementById('modal').classList.add('active');
        }, 800);
    }

    function checkQuiz() {
        const input = document.getElementById('m-input').value.trim();
        if (input === orgData[currentId].a) {
            if (!collectedClues.has(currentId)) {
                collectedClues.add(currentId);
                const container = document.getElementById('clue-container');
                const badge = document.createElement('div');
                badge.className = 'clue-badge';
                badge.innerText = `📍 ${orgData[currentId].clue}`;
                container.prepend(badge); // 최신 단서가 위로
            }
            alert("중요 단서를 확보했습니다!");
            closeModal();
        } else {
            alert("잘못된 키워드입니다.");
        }
    }

    function closeModal() {
        document.getElementById('cell-image-container').style.transform = `scale(1) translate(0, 0)`;
        document.getElementById('modal').classList.remove('active');
        document.getElementById('m-input').value = "";
    }

    function submitFinalAnswer() {
        const ans = document.getElementById('final-answer').value.trim();
        if (ans === "골지체") {
            alert("🎉 검거 성공! 범인은 배송 사고를 낸 '골지체'였습니다!");
            location.reload();
        } else {
            tries--;
            document.getElementById('try-count').innerText = `기회: ${tries}회`;
            if (tries > 0) {
                alert(`오발령입니다! 진범을 다시 찾아보세요.`);
            } else {
                alert("수사 실패! 범인은 골지체였습니다.");
                location.reload();
            }
        }
    }
</script>
</body>
</html>
